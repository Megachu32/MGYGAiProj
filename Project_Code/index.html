<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Board Game</title>
    <style>
        /* === BASE STYLES === */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            overflow: hidden;
        }

        /* === LAYOUT === */
        #main-panel {
            flex: 7;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2d2d2d;
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.2);
            overflow: auto; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* Wraps the cards and board, limiting max size based on screen height */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 60vh; /* Limits width so it doesn't overflow vertically */
        }

        #terminal-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            background-color: #1a1a1a;
            padding: 20px;
            box-sizing: border-box;
        }

        /* === MAIN BOARD === */
        #board {
            display: grid;
            /* Use fractional units so it squishes/stretches automatically */
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            background-color: #444;
            border: 4px solid #111;
            border-radius: 4px;
            width: 100%;
            aspect-ratio: 1 / 1; /* Forces the board to stay perfectly square */
        }

        .cell {
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .cell:hover {
            background-color: #bbb;
        }

        .cell img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            pointer-events: none;
        }

        /* === PLAYER CARDS === */
        .player-card {
            background-color: #333;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #555;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 200px;
        }

        /* Diagonal alignment inside the wrapper */
        #card-p2 { align-self: flex-start; }
        #card-p1 { align-self: flex-end; }

        .player-card label {
            font-size: 0.8em;
            color: #aaa;
        }

        .player-card input {
            background-color: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 4px;
            font-size: 1.1em;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .player-card input:disabled {
            background-color: transparent;
            border-color: transparent;
            color: #eee;
            font-weight: bold;
            padding-left: 0;
        }

        /* === TERMINAL === */
        .terminal-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            flex: 1;
        }

        button:hover { background-color: #005f9e; }
        button#resetBtn { background-color: #cc3300; }
        button#resetBtn:hover { background-color: #992600; }

        hr {
            border: none;
            border-top: 1px solid #444;
            margin: 10px 0 20px 0;
            width: 100%;
        }

        .settings-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        select, input[type="checkbox"] {
            padding: 5px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }

        #gameon-section {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        #move-history {
            flex: 1;
            background-color: #0d0d0d;
            border: 1px solid #333;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-family: monospace;
            border-radius: 4px;
        }

        .history-entry { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="main-panel">
        <div class="game-wrapper">
            
            <div id="card-p2" class="player-card">
                <label>Opponent</label>
                <input type="text" id="p2-name" value="Player 2">
            </div>

            <div id="board"></div>

            <div id="card-p1" class="player-card">
                <label>You</label>
                <input type="text" id="p1-name" value="Player 1">
            </div>
            
        </div>
    </div>

    <div id="terminal-panel">
        <div class="terminal-controls">
            <button id="toggleGameBtn">Start (gameoff)</button>
            <button id="resetBtn">Reset</button>
        </div>

        <hr>

        <div id="gameoff-section">
            <div class="settings-group">
                <label for="opponentType">Opponent</label>
                <select id="opponentType">
                    <option value="human">Human</option>
                    <option value="ai1">AI 1</option>
                </select>
            </div>
            
            <div class="settings-group" style="flex-direction: row; align-items: center;">
                <label for="clockToggle">Clock:</label>
                <input type="checkbox" id="clockToggle"> <span style="font-size: 0.9em; color: #aaa;">(off)</span>
            </div>
        </div>

        <div id="gameon-section">
            <h3 style="margin-top: 0;">Move History</h3>
            <div id="move-history"></div>
            <button id="exportMovesBtn">Export Moves</button>
        </div>
    </div>

    <!-- Calls the main Javascript file -->
    <script src="./main.js"></script>
</body>
</html>
